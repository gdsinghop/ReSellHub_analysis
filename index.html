<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
header { background:#111; color:white; padding:20px; text-align:center; }

.products {
display:flex;
gap:20px;
justify-content:center;
padding:40px;
flex-wrap:wrap;
}

.product {
background:white;
padding:20px;
width:250px;
text-align:center;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

button {
background:#111;
color:white;
padding:10px;
border:none;
cursor:pointer;
margin-top:10px;
}

.payment-box{
background:white;
width:350px;
margin:40px auto;
padding:20px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin:5px 0 15px 0;
}

<body>

<!-- Google Tag Manager (noscript) -->

<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MC8WW47H"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>
<h1>ResellHub</h1>
<p>Refurbished Smartphones at Best Prices</p>
</header>

<section class="products">

<div class="product">
<h3 onclick="trackEvent('view_item','iPhone 13',45000)">iPhone 13 (Refurbished)</h3>
<p>₹45,000</p>
<button onclick="trackEvent('add_to_cart','iPhone 13',45000)">Add to Cart</button>
</div>

<div class="product">
<h3 onclick="trackEvent('view_item','Samsung S21',32000)">Samsung Galaxy S21</h3>
<p>₹32,000</p>
<button onclick="trackEvent('add_to_cart','Samsung S21',32000)">Add to Cart</button>
</div>

<div class="product">
<h3 onclick="trackEvent('view_item','OnePlus 9',28000)">OnePlus 9</h3>
<p>₹28,000</p>
<button onclick="trackEvent('add_to_cart','OnePlus 9',28000)">Add to Cart</button>
</div>

</section>

<div class="payment-box">

<h2>Demo Payment</h2>

<form onsubmit="processPayment(event)">

<label>Card Number</label> <input type="text" id="cardNumber" required>

<label>Name</label> <input type="text" required>

<label>Expiry</label> <input type="text" required>

<label>CVV</label> <input type="password" required>

<button type="submit">Pay Now</button>

</form>

<p id="paymentResult"></p>

</div>

<script>

// Push events to GTM
function trackEvent(eventName, name, price){
dataLayer.push({
event: eventName,
item_name: name,
value: price,
currency: 'INR'
});
}

function processPayment(e){
e.preventDefault();

let card=document.getElementById("cardNumber").value;
let result=document.getElementById("paymentResult");

if(card==="1111 1111 1111 1111"){
result.innerHTML="✅ Payment Successful!";
result.style.color="green";

dataLayer.push({
event:'purchase',
transaction_id:'RH'+Math.floor(Math.random()*100000),
value:45000,
currency:'INR'
});

}else{
result.innerHTML="❌ Payment Failed!";
result.style.color="red";
}
}

</script>
